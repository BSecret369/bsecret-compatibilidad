<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSecret · Tu informe está listo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #faf8fc;
      --surface: rgba(80,30,110,0.06);
      --border: rgba(80,30,110,0.2);
      --purple: #3d1060;
      --purple-mid: #5a2080;
      --purple-light: #7a3898;
      --gold: #a0782a;
      --gold-light: #c8a050;
      --gold-pale: #e8d090;
      --text: #1a0828;
      --text-muted: #3d1060;
      --text-dim: #7a5090;
      --error-bg: rgba(160,60,80,0.1);
      --error-border: rgba(180,80,100,0.4);
      --error-text: #c05070;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Crimson Text', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 15% 15%, rgba(80,30,110,0.07) 0%, transparent 45%), radial-gradient(ellipse at 85% 85%, rgba(160,120,40,0.05) 0%, transparent 45%); pointer-events: none; z-index: 0; }
    .container { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 48px; }
    .header-eyebrow { font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; font-style: italic; color: var(--purple); line-height: 1; margin-bottom: 6px; }
    .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; }
    .loading-state { text-align: center; padding: 60px 0; }
    .loading-symbol { font-size: 32px; color: var(--gold); animation: pulse 2s infinite; margin-bottom: 20px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .loading-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; color: var(--purple-mid); margin-bottom: 8px; }
    .loading-sub { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
    .progress-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; margin-top: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-light), var(--purple-light)); border-radius: 2px; animation: progress 25s linear forwards; }
    @keyframes progress { from { width: 0%; } to { width: 95%; } }
    .result-header { text-align: center; margin-bottom: 32px; }
    .result-eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
    .result-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; font-style: italic; color: var(--purple); margin-bottom: 8px; }
    .result-names { font-size: 13px; color: var(--gold); letter-spacing: 3px; font-weight: 600; text-transform: uppercase; }
    .result-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 20px; font-size: 16px; line-height: 1.95; color: var(--text); }
    .result-content h2 { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-style: italic; color: var(--purple-mid); margin: 28px 0 12px; font-weight: 400; border-bottom: 1px solid rgba(160,120,40,0.2); padding-bottom: 6px; }
    .result-content h2:first-child { margin-top: 0; }
    .result-content p { margin-bottom: 14px; }
    .btn-primary { background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 50%, var(--purple) 100%); border: 1px solid rgba(160,120,40,0.3); color: var(--gold-pale); padding: 16px 32px; border-radius: 10px; font-size: 13px; font-family: 'Cormorant Garamond', serif; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; font-weight: 600; width: 100%; transition: opacity 0.2s, transform 0.2s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .error-box { background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 10px; padding: 14px 18px; color: var(--error-text); font-size: 14px; margin-bottom: 16px; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: var(--text-dim); font-size: 13px; text-decoration: none; }
    .footer-note { text-align: center; font-size: 12px; color: var(--gold); margin-top: 40px; font-style: italic; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-eyebrow">✦ Astrología Psicológica ✦</div>
      <div class="header-title">BSecret</div>
      <div class="divider"></div>
    </div>

    <div id="loadingView">
      <div class="loading-state">
        <div class="loading-symbol">✦</div>
        <div class="loading-text">Pago confirmado · Generando tu informe...</div>
        <div class="loading-sub">Las estrellas están hablando</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>
    </div>

    <div id="resultView" style="display:none;">
      <div class="result-header">
        <div class="result-eyebrow">✦ Tu informe de compatibilidad ✦</div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-names" id="resultNames"></div>
        <div class="divider"></div>
      </div>
      <div class="result-content" id="resultContent"></div>
      <button class="btn-primary" onclick="downloadPDF()">✦ Descargar informe en PDF ✦</button>
      <a href="/" class="back-link">Hacer otro informe</a>
    </div>

    <div id="errorView" style="display:none;">
      <div class="error-box" id="errorMsg"></div>
      <a href="/" class="back-link">Volver al inicio</a>
    </div>

    <div class="footer-note">Informe generado al instante · Interpretado con psicología junguiana · BSecret</div>
  </div>

  <script>
    let reportData = null;

    function getSign(dateStr) {
      if (!dateStr) return '';
      const [, month, day] = dateStr.split('-').map(Number);
      const signs = [
        [1,20,'Capricornio'],[2,19,'Acuario'],[3,20,'Piscis'],[4,20,'Aries'],
        [5,21,'Tauro'],[6,21,'Géminis'],[7,23,'Cáncer'],[8,23,'Leo'],
        [9,23,'Virgo'],[10,23,'Libra'],[11,22,'Escorpio'],[12,22,'Sagitario'],[12,31,'Capricornio']
      ];
      for (const [m, d, sign] of signs) {
        if (month < m || (month === m && day <= d)) return sign;
      }
      return 'Capricornio';
    }

    function formatReportHTML(text) {
      const parts = text.split(/(## .+)/g);
      let html = '';
      for (const part of parts) {
        if (part.startsWith('## ')) {
          html += `<h2>${part.replace('## ', '')}</h2>`;
        } else {
          const paras = part.trim().split(/\n\n+/);
          for (const p of paras) {
            if (p.trim()) html += `<p>${p.trim().replace(/\n/g, '<br/>')}</p>`;
          }
        }
      }
      return html;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (!sessionId) return showError('Sesión no válida.');

      try {
        const sessionRes = await fetch(`/api/get-session?session_id=${sessionId}`);
        if (!sessionRes.ok) throw new Error('Pago no verificado');
        const { metadata } = await sessionRes.json();
        reportData = metadata;

        const reportRes = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(metadata)
        });
        const result = await reportRes.json();
        if (!result.text) throw new Error('Sin respuesta');

        reportData.reportText = result.text;
        reportData.sign1 = result.sign1;
        reportData.sign2 = result.sign2;

        try {
          await fetch('/api/save-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: metadata.email, name: metadata.name1 })
          });
        } catch(e) {}

        showResult(result.text, result.sign1, result.sign2);

      } catch(err) {
        showError('Error al generar el informe. Escríbenos a hola@bsecret.es con tu número de pedido.');
      }
    }

    function showResult(text, sign1, sign2) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('resultView').style.display = 'block';
      document.getElementById('resultTitle').textContent = `${reportData.name1} & ${reportData.name2}`;
      document.getElementById('resultNames').textContent = `${sign1} · ${sign2}`;
      document.getElementById('resultContent').innerHTML = formatReportHTML(text);
    }

    function showError(msg) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('errorView').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }

    function downloadPDF() {
      if (!reportData) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 20;
      const contentW = pageW - margin * 2;
      let y = margin;

      doc.setFillColor(250, 248, 252);
      doc.rect(0, 0, pageW, pageH, 'F');
      doc.setDrawColor(160, 120, 42);
      doc.setLineWidth(0.5);
      doc.line(margin, y + 6, pageW - margin, y + 6);
      doc.setLineWidth(0.2);
      doc.line(margin, y + 9, pageW - margin, y + 9);
      y += 20;

      doc.setFont('times', 'italic');
      doc.setFontSize(28);
      doc.setTextColor(61, 16, 96);
      doc.text('BSecret', pageW / 2, y, { align: 'center' });
      y += 8;

      doc.setFontSize(12);
      doc.setTextColor(160, 120, 42);
      doc.text('Compatibilidad de Almas', pageW / 2, y, { align: 'center' });
      y += 10;

      doc.setFont('times', 'bolditalic');
      doc.setFontSize(17);
      doc.setTextColor(26, 8, 40);
      doc.text(`${reportData.name1} & ${reportData.name2}`, pageW / 2, y, { align: 'center' });
      y += 7;

      doc.setFont('times', 'normal');
      doc.setFontSize(11);
      doc.setTextColor(160, 120, 42);
      doc.text(`${reportData.sign1}  ·  ${reportData.sign2}`, pageW / 2, y, { align: 'center' });
      y += 12;

      doc.setDrawColor(160, 120, 42);
      doc.setLineWidth(0.5);
      doc.line(margin, y, pageW - margin, y);
      y += 10;

      doc.setFont('times', 'normal');
      doc.setFontSize(11);
      doc.setTextColor(26, 8, 40);

      const lines = reportData.reportText.split('\n');
      for (const line of lines) {
        if (y > pageH - margin - 15) {
          doc.addPage();
          doc.setFillColor(250, 248, 252);
          doc.rect(0, 0, pageW, pageH, 'F');
          y = margin + 10;
        }
        if (line.startsWith('## ')) {
          y += 5;
          doc.setFont('times', 'bolditalic');
          doc.setFontSize(13);
          doc.setTextColor(90, 32, 128);
          doc.text(line.replace('## ', ''), margin, y);
          y += 3;
          doc.setDrawColor(160, 120, 42);
          doc.setLineWidth(0.15);
          doc.line(margin, y + 1, pageW - margin, y + 1);
          y += 8;
          doc.setFont('times', 'normal');
          doc.setFontSize(11);
          doc.setTextColor(26, 8, 40);
        } else if (line.trim() === '') {
          y += 4;
        } else {
          const wrapped = doc.splitTextToSize(line.replace(/\*\*(.+?)\*\*/g, '$1'), contentW);
          for (const wline of wrapped) {
            if (y > pageH - margin - 15) {
              doc.addPage();
              doc.setFillColor(250, 248, 252);
              doc.rect(0, 0, pageW, pageH, 'F');
              y = margin + 10;
            }
            doc.text(wline, margin, y);
            y += 6.5;
          }
        }
      }

      doc.setDrawColor(160, 120, 42);
      doc.setLineWidth(0.5);
      doc.line(margin, pageH - 17, pageW - margin, pageH - 17);
      doc.setFont('times', 'italic');
      doc.setFontSize(9);
      doc.setTextColor(160, 120, 42);
      doc.text('BSecret · Astrología Psicológica · bsecret.es', pageW / 2, pageH - 10, { align: 'center' });

      const filename = `BSecret-Compatibilidad-${reportData.name1}-${reportData.name2}.pdf`.replace(/\s+/g, '-');
      doc.save(filename);
    }

    init();
  </script>
</body>
</html>
